services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ledgerlens
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: apps/api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ledger:ledger@db:5432/ledgerlens
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - db
    volumes:
      - ./apps/api:/app

  web:
    build: apps/web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  pgdata:
